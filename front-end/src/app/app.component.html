<div class="app-shell" [ngClass]="[_commonService.layoutVM.toogleWrapper]">

  <!-- Global Loader -->
  <app-spinner></app-spinner>

  <!-- LEFT SIDEBAR (Only when allowed) -->
  <app-side-menu *ngIf="_commonService.layoutVM.showLeftSideMenu"></app-side-menu>

  <!-- MAIN AREA -->
  <div
    class="app-main"
    [id]="_commonService.layoutVM.showLeftSideMenu ? 'content' : ''"
  >

    <!-- TOP NAV (Only when allowed) -->
    <app-top-nav
      class="topBar"
      *ngIf="_commonService.layoutVM.showLeftSideMenu"
    ></app-top-nav>

    <!-- PAGE CONTENT -->
    <div class="app-content">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
