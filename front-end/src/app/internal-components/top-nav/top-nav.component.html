<header class="iw-topbar" *ngIf="_commonService.layoutVM.showLeftSideMenu">
  <div class="iw-topbar-inner container-fluid">
    <div class="iw-topbar-shell">
      <div class="iw-topbar-left">
        <div class="iw-brandMini">
          <div class="iw-brandMini-logo">I</div>
          <div class="iw-brandMini-text">
            <div class="iw-brandMini-name">Internal Workspace</div>
            <div class="iw-brandMini-sub">CRM Control Center</div>
          </div>
        </div>

        <button
          id="sidebarCollapse"
          class="iw-icon-btn"
          (click)="toggleMenu()"
          aria-label="Toggle sidebar"
        >
          <i class="bi bi-list iw-ic"></i>
        </button>

        <div class="iw-center">
          <div class="iw-title-wrap">
            <div class="iw-kicker">Internal Workspace</div>
            <div class="iw-title">
              {{ _commonService.layoutVM.PageTitle }}
            </div>
          </div>
        </div>
      </div>

      <div class="iw-topbar-right">
        <div class="iw-actions">

          <!-- Notifications -->
          <div
            class="iw-notification-wrap"
            *ngIf="_commonService.layoutVM.tokenRole == 3 || _commonService.layoutVM.tokenRole == 4"
          >
            <button
              type="button"
              class="iw-icon-btn"
              aria-label="Notifications"
              (click)="toggleNotifications($event)"
            >
              <i class="bi bi-bell iw-ic"></i>
              <span class="iw-badge" *ngIf="unreadCount > 0">
                {{ unreadCount > 99 ? '99+' : unreadCount }}
              </span>
            </button>

            <div class="iw-notification-panel" *ngIf="showNotificationsDropdown">
              <div class="iw-panel-head">
                <div>
                  <div class="iw-panel-title">Notifications</div>
                  <div class="iw-panel-sub">
                    {{ unreadCount }} unread
                  </div>
                </div>

                <button
                  type="button"
                  class="iw-text-btn"
                  (click)="markAllAsRead()"
                  *ngIf="unreadCount > 0"
                >
                  Mark all read
                </button>
              </div>

              <div class="iw-panel-body" *ngIf="notificationsPreview.length > 0; else emptyNotifications">
                <button
                  type="button"
                  class="iw-noti-item"
                  *ngFor="let item of notificationsPreview"
                  [class.unread]="!item.isRead"
                  (click)="openNotification(item)"
                >
                  <div class="iw-noti-icon">
                    <i [class]="getNotificationIcon(item.type)"></i>
                  </div>

                  <div class="iw-noti-content">
                    <div class="iw-noti-top">
                      <div class="iw-noti-title">{{ item.title }}</div>
                      <span class="iw-noti-dot" *ngIf="!item.isRead"></span>
                    </div>

                    <div class="iw-noti-message">{{ item.message }}</div>
                    <div class="iw-noti-time">{{ item.time }}</div>
                  </div>
                </button>
              </div>

              <ng-template #emptyNotifications>
                <div class="iw-empty-notifications">
                  <i class="bi bi-bell-slash"></i>
                  <div>No notifications yet</div>
                </div>
              </ng-template>

              <div class="iw-panel-foot">
                <button
                  type="button"
                  class="iw-view-all-btn"
                  (click)="goToNotifications()"
                >
                  View all notifications
                </button>
              </div>
            </div>
          </div>

          <!-- Logout -->
          <button
            type="button"
            class="iw-icon-btn danger"
            (click)="logOutUser()"
            aria-label="Log out"
          >
            <i class="bi bi-box-arrow-left iw-ic"></i>
          </button>

          <!-- User chip -->
          <div class="iw-userchip d-none d-lg-flex">
            <div class="iw-avatar">
              {{ (_commonService.layoutVM.loggedUserName || 'U').slice(0,1) }}
            </div>
            <div class="iw-user-meta">
              <div class="iw-user-name">
                {{ _commonService.layoutVM.loggedUserName || 'User' }}
              </div>
              <div class="iw-user-sub">Welcome back</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</header>
