<div class="loader-overlay" *ngIf="_commonService.loaderInfo.showLoader">
  <div class="loader-shell">
    <div class="loader-orbital" aria-hidden="true">
      <span class="loader-ring loader-ring--outer"></span>
      <span class="loader-ring loader-ring--mid"></span>
      <span class="loader-ring loader-ring--inner"></span>
      <span class="loader-core">S</span>
    </div>

    <div class="loader-copy">
      <div class="loader-kicker">Please wait</div>
      <div class="loader-title">{{ _commonService.loaderInfo.message || 'Loading your workspace' }}</div>
      <div class="loader-sub">Preparing data, syncing UI, and getting things ready.</div>
    </div>

    <div class="loader-progress" aria-hidden="true">
      <span class="loader-progress-bar"></span>
    </div>
  </div>
</div>
