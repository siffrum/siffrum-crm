<div class="container" *ngIf="viewModel.validateAuthCode == 1">
  <div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12 col-12 d-flex justify-content-center mt-5">
      <div class="card text-center mt-5">
        <div class="card-header h5">Reset Password</div>

        <div class="card-body px-5">
          <p class="card-text py-2">
            Enter your new password and we’ll send you back to the login page.
          </p>

          <form #resetPasswordForm="ngForm">
            <!-- New Password -->
            <div class="login__field">
              <div class="position-relative w-100">
                <i
                  class="login__icon bi bi-lock-fill"
                  (mouseenter)="viewModel.showTooltip = true"
                  (mouseleave)="viewModel.showTooltip = false"
                  [attr.title]="'Password'"
                  [attr.data-placement]="'left'"
                  [ngClass]="{ 'tooltip-show': viewModel.showTooltip }"
                ></i>

                <input
                  [(ngModel)]="viewModel.resetPasswordDetails.newPassword"
                  [type]="viewModel.hide ? 'password' : 'text'"
                  class="login__input"
                  placeholder="Enter new password"
                  name="newPassword"
                  #newPassword="ngModel"
                  required
                />

                <i
                  (click)="togglePassword()"
                  class="bi bi-eye-fill eye"
                  [ngClass]="[viewModel.eyeDefault, viewModel.showTooltip ? 'tooltip-show' : '']"
                  (mouseenter)="viewModel.showTooltip = true"
                  (mouseleave)="viewModel.showTooltip = false"
                  [attr.title]="'Show'"
                  [attr.data-placement]="'left'"
                >
                </i>
              </div>
            </div>

            <ng-container *ngFor="let validation of viewModel.ValidationData.newPassword">
              <div
                class="text-danger ms-lg-2 ms-md-2 ms-sm-2 ms-2"
                *ngIf="
                  (newPassword.touched || viewModel.FormSubmitted) &&
                  newPassword.hasError(validation.type)
                "
              >
                {{ validation.message }}
              </div>
            </ng-container>

            <!-- Confirm Password -->
            <div class="login__field">
              <div class="position-relative w-100">
                <i
                  class="login__icon bi bi-lock-fill"
                  (mouseenter)="viewModel.showTooltip = true"
                  (mouseleave)="viewModel.showTooltip = false"
                  [attr.title]="'Confirm Password'"
                  [attr.data-placement]="'left'"
                  [ngClass]="{ 'tooltip-show': viewModel.showTooltip }"
                ></i>

                <input
                  [(ngModel)]="viewModel.confirmPassword"
                  [type]="viewModel.hide ? 'password' : 'text'"
                  class="login__input"
                  placeholder="Confirm new password"
                  name="confirmPassword"
                  #confirmPassword="ngModel"
                  required
                />

                <i
                  (click)="togglePassword()"
                  class="bi bi-eye-fill eye"
                  [ngClass]="[viewModel.eyeDefault, viewModel.showTooltip ? 'tooltip-show' : '']"
                  (mouseenter)="viewModel.showTooltip = true"
                  (mouseleave)="viewModel.showTooltip = false"
                  [attr.title]="'Show'"
                  [attr.data-placement]="'left'"
                >
                </i>
              </div>
            </div>

            <ng-container *ngFor="let validation of viewModel.ValidationData.confirmPassword">
              <div
                class="text-danger ms-lg-2 ms-md-2 ms-sm-2 ms-2"
                *ngIf="
                  (confirmPassword.touched || viewModel.FormSubmitted) &&
                  confirmPassword.hasError(validation.type)
                "
              >
                {{ validation.message }}
              </div>
            </ng-container>

            <!-- Password mismatch -->
            <div
              class="text-danger ms-lg-2 ms-md-2 ms-sm-2 ms-2"
              *ngIf="
                (confirmPassword.touched || viewModel.FormSubmitted) &&
                viewModel.resetPasswordDetails.newPassword &&
                viewModel.confirmPassword &&
                viewModel.resetPasswordDetails.newPassword !== viewModel.confirmPassword
              "
            >
              Passwords do not match
            </div>

            <button
              type="button"
              class="btn coinLoginButton w-100 mt-3"
              [disabled]="resetPasswordForm.invalid"
              (click)="click_resetPassword(resetPasswordForm)"
            >
              Submit
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Invalid / expired link state -->
<div class="container" *ngIf="viewModel.validateAuthCode != 1">
  <div class="row">
    <div class="col-lg-12 col-md-12 col-sm-12 col-12 d-flex justify-content-center mt-5">
      <div class="card text-center mt-5">
        <div class="card-header h5">Reset Password</div>

        <div class="card-body px-5">
          <p class="card-text py-3 text-danger">
            This password reset link is invalid or expired.
          </p>

          <button
            type="button"
            class="btn coinLoginButton w-100 mt-2"
            routerLink="/login"
          >
            Back to Login
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
