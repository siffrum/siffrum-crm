<!-- ATTENDANCE HEADER STRIP -->
<div class="att-shell">

  <div class="att-top card-soft">
    <div class="att-top-left">
      <div class="att-kicker">Attendance</div>

      <ng-container *ngIf="viewModel.currentShift; else noShift">
        <div class="att-shift">
          <div class="shift-badge">
            <span class="dot"></span>
            <span class="txt">Current Shift</span>
          </div>

          <div class="shift-title">
            {{ viewModel.currentShift.shiftName }}
          </div>

          <div class="shift-time">
            {{ viewModel.currentShift.shiftFrom | date: 'hh:mm a' }}
            <span class="sep">→</span>
            {{ viewModel.currentShift.shiftTo | date: 'hh:mm a' }}
          </div>
        </div>
      </ng-container>

      <ng-template #noShift>
        <div class="att-empty">
          <div class="empty-ic">⏳</div>
          <div>
            <div class="empty-title">No office hours</div>
            <div class="empty-sub">No shift is available at the moment.</div>
          </div>
        </div>
      </ng-template>
    </div>

    <!-- ACTIONS -->
    <div class="att-top-right" *ngIf="viewModel.currentShift">
      <button
        class="btn-soft btn-in me-2"
        *ngIf="viewModel.isCheckInButton
          && viewModel.companyAttendanceShiftDetailsList
          && viewModel.companyAttendanceShiftDetailsList.length > 0
          && viewModel.Permission?.add"
        (click)="checkIn(viewModel.currentDate)">
        <span class="ic">↗</span>
        Check In
      </button>

      <button
        class="btn-soft btn-out"
        *ngIf="viewModel.isCheckOutButton
          && viewModel.companyAttendanceShiftDetailsList
          && viewModel.companyAttendanceShiftDetailsList.length > 0
          && viewModel.Permission?.edit"
        (click)="checkOut(viewModel.currentDate)">
        <span class="ic">↘</span>
        Check Out
      </button>
    </div>
  </div>

  <!-- CALENDAR CARD -->
  <div class="att-card card-soft mt-2">
    <div class="att-card-head">
      <button class="btn-nav" (click)="prevMonth()">
        <span class="chev">‹</span>
        Prev
      </button>

      <div class="att-month">
        <div class="month-title">{{ viewModel.viewDate | date: "MMMM y" }}</div>
        <div class="month-sub">Tap a day to view status</div>
      </div>

      <button class="btn-nav" (click)="nextMonth()" [disabled]="viewModel.isNextButtonDisabled">
        Next
        <span class="chev">›</span>
      </button>
    </div>

    <div class="att-card-body" *ngIf="viewModel.Permission?.view">
      <div class="tableFixHead" [ngSwitch]="viewModel.view">
        <mwl-calendar-month-view
          *ngSwitchCase="viewModel.CalendarView.Month"
          [viewDate]="viewModel.viewDate"
          [events]="viewModel.events">
        </mwl-calendar-month-view>
      </div>
    </div>
  </div>

</div>
