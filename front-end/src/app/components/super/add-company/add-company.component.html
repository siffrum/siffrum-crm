<div class="super-container">

  <!-- 🔷 Wizard Header -->
  <div class="wizard-header">
    <div class="wizard-step" [ngClass]="_commonService.layoutVM.wizardLocation == 0 ? 'active' : ''">
      <span>1</span>
      <p>Company Info</p>
    </div>

    <div class="wizard-step" [ngClass]="_commonService.layoutVM.wizardLocation == 1 ? 'active' : ''">
      <span>2</span>
      <p>Address</p>
    </div>

    <div class="wizard-step" [ngClass]="_commonService.layoutVM.wizardLocation == 2 ? 'active' : ''">
      <span>3</span>
      <p>Modules</p>
    </div>

    <div class="wizard-step" [ngClass]="_commonService.layoutVM.wizardLocation == 3 ? 'active' : ''">
      <span>4</span>
      <p>Admin</p>
    </div>
  </div>

  <!-- ================= STEP 1 ================= -->
  <div *ngIf="_commonService.layoutVM.wizardLocation == 0" class="super-card">
    <h2 class="card-title">Add Company Info</h2>

    <form #companyOverviewForm="ngForm" class="form-grid">

      <!-- Company Code -->
      <div class="form-group">
        <label>Company Code *</label>
        <input type="text" class="super-input"
          [(ngModel)]="viewModel.AddCompanyDetail.companyCode"
          name="companyCode" #companyCode="ngModel" required minlength="3" maxlength="10">
      </div>

      <!-- Name -->
      <div class="form-group">
        <label>Company Name *</label>
        <input type="text" class="super-input"
          [(ngModel)]="viewModel.AddCompanyDetail.name"
          name="name" #name="ngModel" required>
      </div>

      <!-- Description -->
      <div class="form-group full">
        <label>Description *</label>
        <textarea class="super-input"
          [(ngModel)]="viewModel.AddCompanyDetail.description"
          name="description"></textarea>
      </div>

      <!-- Date -->
      <div class="form-group">
        <label>Establishment Date *</label>
        <input type="date" class="super-input"
          [(ngModel)]="viewModel.AddCompanyDetail.companyDateOfEstablishment"
          name="companyDateOfEstablishment">
      </div>

      <!-- Website -->
      <div class="form-group">
        <label>Website *</label>
        <input type="text" class="super-input"
          [(ngModel)]="viewModel.AddCompanyDetail.companyWebsite"
          name="companyWebsite">
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email *</label>
        <input type="email" class="super-input"
          [(ngModel)]="viewModel.AddCompanyDetail.companyContactEmail"
          name="contactEmail">
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label>Phone *</label>
        <input type="text" class="super-input"
          [(ngModel)]="viewModel.AddCompanyDetail.companyMobileNumber"
          name="companyMobileNumber">
      </div>

      <div class="form-actions">
        <button class="super-btn"
          (click)="addNewCompanyDetails(companyOverviewForm)">
          Save & Next →
        </button>
      </div>

    </form>
  </div>

  <!-- ================= STEP 2 ================= -->
  <div *ngIf="_commonService.layoutVM.wizardLocation == 1" class="super-card">
    <h2 class="card-title">Company Address</h2>

    <form #companyAddressForm="ngForm" class="form-grid">

      <div class="form-group full">
        <label>Registered Address *</label>
        <input class="super-input"
          [(ngModel)]="viewModel.AddCompanyAddress.address1"
          name="address1">
      </div>

      <div class="form-group full">
        <label>Corporate Address *</label>
        <input class="super-input"
          [(ngModel)]="viewModel.AddCompanyAddress.address2"
          name="address2">
      </div>

      <div class="form-group">
        <label>Country</label>
        <input class="super-input"
          [(ngModel)]="viewModel.AddCompanyAddress.country"
          name="country">
      </div>

      <div class="form-group">
        <label>State</label>
        <input class="super-input"
          [(ngModel)]="viewModel.AddCompanyAddress.state"
          name="state">
      </div>

      <div class="form-group">
        <label>City</label>
        <input class="super-input"
          [(ngModel)]="viewModel.AddCompanyAddress.city"
          name="city">
      </div>

      <div class="form-group">
        <label>Pincode</label>
        <input class="super-input"
          [(ngModel)]="viewModel.AddCompanyAddress.pinCode"
          name="pinCode">
      </div>

      <div class="form-actions">
        <button class="super-btn"
          (click)="addNewCompanyAddress(companyAddressForm)">
          Save & Next →
        </button>
      </div>

    </form>
  </div>

  <!-- STEP 3 -->
  <div *ngIf="_commonService.layoutVM.wizardLocation == 2" class="super-card">
    <app-module-permissions [company]="viewModel.AddCompanyDetail"></app-module-permissions>
  </div>

  <!-- STEP 4 -->
  <div *ngIf="_commonService.layoutVM.wizardLocation == 3" class="super-card">
    <app-add-admin [company]="viewModel.AddCompanyDetail"></app-add-admin>
  </div>

</div>
