<div class="sa-table-page">
  <div class="sa-table-shell">
    <div class="sa-table-head">
      <div>
        <h2>Company Dashboard</h2>
        <p>Review client companies, open company profiles, and manage activation status.</p>
      </div>

      <div class="sa-table-actions">
        <div class="sa-stat-chip">
          <span>Total Companies</span>
          <strong>{{viewModel.pagination.totalCount}}</strong>
        </div>
        <button class="sa-btn" routerLink="../add-company">Add New Company</button>
      </div>
    </div>

    <div class="sa-table-wrap">
      <table class="table sa-table mb-0">
        <thead>
          <tr>
            <th>Company Code</th>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th class="text-end">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of viewModel.clientCompanyDetaillist">
            <td>{{item.companyCode}}</td>
            <td class="sa-table-name">{{item.name}}</td>
            <td>{{item.description || '-'}}</td>
            <td class="align-middle">
              <div class="form-check form-switch sa-switch">
                <input mdbCheckbox class="form-check-input" [checked]="item.isEnabled" type="checkbox"
                  (change)="updateCompanyStatus($event, item.id)">
              </div>
            </td>
            <td class="text-end">
              <button class="sa-icon-btn" routerLink="../overview/{{item.id}}">
                <i class="bi bi-arrow-up-right"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="col-lg-12 col-md-12 col-sm-12 col-12 d-flex justify-content-center pt-3"
      *ngIf="viewModel.pagination && viewModel.pagination.totalCount">
      <pagination (selectedPageNum)="loadPagedataWithPagination($event)" [viewModel]="viewModel.pagination">
      </pagination>
    </div>
  </div>
</div>
