<div class="sa-table-page">
  <div class="sa-table-shell">
    <div class="sa-table-head">
      <div>
        <h2>Contact Inbox</h2>
        <p>Monitor incoming contact requests and clear handled items from the queue.</p>
      </div>
      <div class="sa-stat-chip">
        <span>Messages</span>
        <strong>{{ viewModel.contactUsDataList.length || 0 }}</strong>
      </div>
    </div>

    <div class="sa-table-wrap">
      <table class="table sa-table mb-0">
        <thead>
          <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Email</th>
            <th>Message</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let data of viewModel.contactUsDataList">
            <td class="sa-table-name">{{data.name}}</td>
            <td>{{data.subject}}</td>
            <td>{{data.emailId}}</td>
            <td class="sa-message">{{data.message}}</td>
            <td class="text-end">
              <button class="sa-icon-btn sa-danger" (click)="deleteContactUsDetails(data.id)">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
