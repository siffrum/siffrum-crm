<section class="pricing-shell">

  <div class="pricing-hero" data-aos="zoom-out" data-aos-duration="1200">
    <div class="pricing-hero-inner">
      <div class="kicker">Plans</div>
      <h1>Checkout our Pricing Plans</h1>
      <p class="sub">Choose the right plan for your team. Upgrade or renew anytime.</p>
    </div>
  </div>

  <div class="container-fluid pricing-body">
    <div class="pricing-row-wrap">

      <!-- Scroll Buttons (Desktop only) -->
      <button
        class="btn scrollBtn scrollBtn-left d-lg-inline-flex d-none"
        type="button"
        (click)="scrollLeft()"
        aria-label="Scroll left"
      >
        <i class="bi bi-chevron-left"></i>
      </button>

      <button
        class="btn scrollBtn scrollBtn-right d-lg-inline-flex d-none"
        type="button"
        (click)="scrollRight()"
        aria-label="Scroll right"
      >
        <i class="bi bi-chevron-right"></i>
      </button>

      <!-- IMPORTANT: NO (wheel) HERE (we attach non-passive listener in TS) -->
      <div class="row cardsRow g-0" #pricingCards>

        <div
          class="col-lg-4 col-md-6 col-sm-10 col-12 cardColumn"
          *ngFor="let item of viewModel.LicenseTypeList; let i = index"
          data-aos="fade-up"
          data-aos-duration="900"
          [attr.data-aos-delay]="i * 80"
        >
          <div class="plan-card">

            <div class="plan-top">
              <div class="plan-icon">
                <i class="bi bi-send"></i>
              </div>

              <div class="plan-badge" *ngIf="i === 1">Most Popular</div>

              <h5 class="plan-title">{{ item.title }}</h5>

              <div class="plan-price">
                <span class="currency">$</span>
                <span class="amount">{{ item.amount }}</span>
                <span class="cycle">/ {{ item.validityInDays }} Days</span>
              </div>

              <div class="plan-actions">
                <button
                  type="button"
                  (click)="payNow(item.stripePriceId, item.id)"
                  class="btn plan-btn"
                  [class.btn-disabled]="!IsValidForRole(item.validFor)"
                  [disabled]="!IsValidForRole(item.validFor)"
                >
                  {{ viewModel.buyBtn }}
                </button>

                <button
                  type="button"
                  (click)="click_Renew()"
                  class="btn plan-btn outline"
                  *ngIf="viewModel.checkValidUser && viewModel.checkActiveLicense"
                  [class.btn-disabled]="viewModel.purchasedBtn === 'Purchased'"
                  [disabled]="viewModel.purchasedBtn === 'Purchased'"
                >
                  {{ viewModel.purchasedBtn }}
                </button>

                <div class="role-hint" *ngIf="!IsValidForRole(item.validFor)">
                  Invalid for your role. Please choose another plan.
                </div>
              </div>
            </div>

            <div class="plan-features">
              <div class="features-title">Included Features</div>
              <ul class="list-unstyled">
                <li *ngFor="let features of item.permissions">
                  <i class="bi bi-check2-circle"></i>
                  <span>{{ features.moduleName }}</span>
                </li>
              </ul>
            </div>

            <div class="plan-glow"></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
